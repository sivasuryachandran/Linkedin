
services:
  # ─── MySQL 8.0 ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: linkedin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: linkedin
      MYSQL_USER: linkedin_user
      MYSQL_PASSWORD: linkedin_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB 7 ───────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: linkedin-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_pass
      MONGO_INITDB_DATABASE: linkedin
    # Host 27018 avoids clashing with a local mongod on 27017 (common on dev laptops).
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: linkedin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka (KRaft mode — no Zookeeper) ──────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: linkedin-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  # ─── Ollama (Local LLM) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: linkedin-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Model files are stored in the ollama_data volume — they persist across
    # restarts.  Pull the model once after first `docker compose up`:
    #   docker exec linkedin-ollama ollama pull llama3.2

  # ─── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linkedin-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ── MySQL (use Docker service name, internal port) ──
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: linkedin_user
      MYSQL_PASSWORD: linkedin_pass
      MYSQL_DATABASE: linkedin
      # ── MongoDB (internal port 27017 — not the host-mapped 27018) ──
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: mongo_user
      MONGO_PASSWORD: mongo_pass
      MONGO_DATABASE: linkedin
      MONGO_AUTH_SOURCE: admin
      # ── Redis ──
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # ── Kafka (PLAINTEXT internal listener) ──
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # ── Ollama ──
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      ollama:
        condition: service_started

  # ─── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linkedin-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  kafka_data:
  ollama_data:
